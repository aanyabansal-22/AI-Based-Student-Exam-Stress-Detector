<!DOCTYPE html>
<html>
<head>
    <title>Stress Level Checker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: white;
            color: #333;
            padding: 25px;
            width: 360px;
            border-radius: 15px;
            box-shadow: 0 0 12px rgba(0,0,0,0.6);
        }

        textarea {
            width: 93%;
            height: 90px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 10px;
            resize: none;
            font-size: 14px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #5c6bf7;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.2s;
        }

        button:hover {
            background: #7986ff;
        }

        #result {
            margin-top: 15px;
            font-size: 22px;
            font-weight: bold;
        }

        #suggestion {
            margin-top: 6px;
            font-size: 15px;
            font-weight: bold;
            color: #444;
        }

        /* Cute Stress Meter Bar */
        .meter {
            width: 100%;
            height: 18px;
            background: #eee;
            border-radius: 20px;
            margin-top: 15px;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            width: 0%;
            background: green;
            border-radius: 20px;
            transition: width 1s ease;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2> Stress Level Detector</h2>
        <p style="font-size:14px;">Write how you feel today:</p>

        <textarea id="inputText" placeholder="Example: I am tired and stressed..."></textarea>

        <button onclick="detect()">Check Stress</button>

        <div id="result"></div>
        <div id="suggestion"></div>

        <div class="meter">
            <div class="meter-fill" id="meterBar"></div>
        </div>
    </div>


<script>
function detect() {
    let text = document.getElementById("inputText").value.toLowerCase();
    let result = document.getElementById("result");
    let suggestion = document.getElementById("suggestion");
    let bar = document.getElementById("meterBar");

    if (text.trim() === "") {
        result.innerHTML = "❗ Please type something.";
        suggestion.innerHTML = "";
        bar.style.width = "0%";
        return;
    }

    let level = "";
    let advice = "";
    let fill = 0;
    let color = "green";

    if (text.includes("happy") || text.includes("good") || text.includes("relaxed")) {
        level = "😊 Low Stress";
        advice = "Keep going! You're doing well";
        fill = 20;
        color = "#1abc9c";
    }
    else if (text.includes("tired") || text.includes("lazy") || text.includes("okay") || text.includes("unsure")) {
        level = "😐 Medium Stress";
        advice = "Take a short break or stretch a little";
        fill = 50;
        color = "#f1c40f";
    }
    else if (text.includes("stress") || text.includes("pressure") || text.includes("worried") || text.includes("angry")) {
        level = "😟 High Stress";
        advice = "Try some deep breaths & relax your shoulders ";
        fill = 75;
        color = "#e67e22";
    }
    else if (text.includes("sad") || text.includes("anxious") || text.includes("panic")) {
        level = "😣 Very High Stress";
        advice = "Please rest. Talk to someone or take a break";
        fill = 95;
        color = "#e74c3c";
    }
    else {
        level = "🙂 Noted!";
        advice = "Remember to take small breaks and take care of yourself.";
        fill = 40;
        color = "#3498db";
    }

    result.innerHTML = level;
    suggestion.innerHTML = advice;
    bar.style.width = fill + "%";
    bar.style.background = color;
}
</script>

</body>
</html>
